fileStorage:
  local:
    persistence:
      enabled: true
      storageClass: longhorn

postgresql:
  enabled: true
  backup:
    enabled: true
    cronjob:
      networkPolicy:
        enabled: true
      schedule: "@hourly"
      storage:
        enabled: true
        # resourcePolicy: keep
        size: 10Gi
        storageClass: longhorn

  global:
    defaultStorageClass: longhorn
    postgresql:
      auth:
        database: outline
        username: ''
        existingSecret: nextcloud
        secretKeys:
          adminPasswordKey: postgresql-admin-password
          userPasswordKey: postgresql-user-password

  primary:
    networkPolicy:
      enabled: true
      extraIngress:
        # needed for istio in ambient mode
        - ports:
          - port: 15008
            protocol: TCP
    persistence:
      enabled: true
      storageClass: longhorn
    resourcesPreset: small

redis:
  enabled: true
  auth:
    existingSecret: outline
    existingSecretPasswordKey: redis-password
  global:
    defaultStorageClass: longhorn
  # needed for istio, see: https://github.com/bitnami/charts/issues/31394
  networkPolicy:
    enabled: true
    extraIngress:
        - ports:
            - port: 15008
  master:
    persistence:
      enabled: false
      storageClass: longhorn
    resourcesPreset: "micro"
  # replica:
  #   persistence:
  #     enabled: true
  #     storageClass: longhorn
  #   replicaCount: 1
  #   resourcesPreset: "micro"
