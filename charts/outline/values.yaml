fileStorage:
  local:
    persistence:
      enabled: true
      storageClass: longhorn

postgresql:
  enabled: true
  backup:
    enabled: true
    cronjob:
      networkPolicy:
        enabled: true
      schedule: "@hourly"
      storage:
        enabled: true
        # resourcePolicy: keep
        size: 10Gi
        storageClass: longhorn

  global:
    defaultStorageClass: longhorn
    postgresql:
      auth:
        database: outline
        username: ''
        existingSecret: nextcloud
        secretKeys:
          adminPasswordKey: postgresql-admin-password
          userPasswordKey: postgresql-user-password

  primary:
    networkPolicy:
      enabled: true
      extraIngress:
        # needed for istio in ambient mode
        - ports:
          - port: 15008
            protocol: TCP
    persistence:
      enabled: true
      storageClass: longhorn
    resourcesPreset: small

externalRedis:
  password: "redisTestPassword"
  # existingSecret: outline
  # usernameSecretKey: "redis-username"
  # passwordSecretKey: "redis-password"
