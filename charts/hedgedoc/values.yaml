existingSecret: hedgedoc
extraEnv:
  CMD_ALLOW_ANONYMOUS: false
  CMD_ALLOW_ANONYMOUS_EDITS: false
  CMD_DOMAIN: ''
  CMD_LOGLEVEL: debug
  CMD_PROTOCOL_USESSL: true
gatewayApi:
  enabled: true
  parentRefs:
    - name: shared-gateway
      namespace: istio-system
persistence:
  storageClass: longhorn

postgresql:
  enabled: true
  auth:
    database: hedgedoc
    username: hedgedoc
    existingSecret: hedgedoc
    secretKeys:
      adminPasswordKey: postgresql-admin-password
      userPasswordKey: postgresql-user-password
  backup:
    enabled: true
    cronjob:
      networkPolicy:
        enabled: true
      schedule: "@hourly"
      storage:
        enabled: true
        # resourcePolicy: keep
        size: 10Gi
        storageClass: longhorn
  primary:
    networkPolicy:
      enabled: true
      # needed for istio in ambient mode
      extraIngress:
        - ports:
            - port: 15008
              protocol: TCP
    persistence:
      enabled: true
      storageClass: longhorn
    resourcesPreset: "small"
