httpRoute:
  enabled: true
  parentRefs:
    - name: shared-gateway
      namespace: istio-system
  hostnames:
    - ''

persistence:
  config:
    annotations:
      argocd.argoproj.io/sync-options: Prune=false
    storageClass: longhorn
  media:
    accessMode: ReadWriteMany
    annotations:
      argocd.argoproj.io/sync-options: Prune=false
    size: 100Gi
    storageClass: longhorn

metrics:
  enabled: true

# Intel UHD 600 (J4105) VAAPI hardware transcoding via Intel GPU Device Plugin
podSecurityContext:
  supplementalGroups:
    - 44   # video group (/dev/dri/card0)
    - 993  # render group (/dev/dri/renderD128)

resources:
  requests:
    cpu: 500m
    memory: 512Mi
    gpu.intel.com/i915: "1"
  limits:
    cpu: 4000m
    memory: 4Gi
    gpu.intel.com/i915: "1"
