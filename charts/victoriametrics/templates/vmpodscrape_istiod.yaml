apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: istiod
spec:
  namespaceSelector:
    matchNames:
      - istio-system

  selector:
    matchLabels:
      app: istiod

  podMetricsEndpoints:
    - port: http-monitoring
      scheme: http

      relabelConfigs:
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_label_app
          targetLabel: app

        - action: replace
          sourceLabels:
            - __meta_kubernetes_namespace
          targetLabel: namespace

        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_name
          targetLabel: pod
