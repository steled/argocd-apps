apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
  labels:
    grafana_dashboard: "1"

configMapGenerator:
  - name: istio-extension-dashboard
    files:
      - istio-extension-dashboard.json=https://raw.githubusercontent.com/istio/istio/1.29.0/manifests/addons/dashboards/istio-extension-dashboard.json

  - name: istio-mesh-dashboard
    files:
      - istio-mesh-dashboard.json=https://raw.githubusercontent.com/istio/istio/1.29.0/manifests/addons/dashboards/istio-mesh-dashboard.gen.json

  - name: istio-performance-dashboard
    files:
      - istio-performance-dashboard.json=https://raw.githubusercontent.com/istio/istio/1.29.0/manifests/addons/dashboards/istio-performance-dashboard.json

  - name: istio-pilot-dashboard
    files:
      - istio-pilot-dashboard.json=https://raw.githubusercontent.com/istio/istio/1.29.0/manifests/addons/dashboards/pilot-dashboard.gen.json

  - name: istio-service-dashboard
    files:
      - istio-service-dashboard.json=https://raw.githubusercontent.com/istio/istio/1.29.0/manifests/addons/dashboards/istio-service-dashboard.json

  - name: istio-workload-dashboard
    files:
      - istio-workload-dashboard.json=https://raw.githubusercontent.com/istio/istio/1.29.0/manifests/addons/dashboards/istio-workload-dashboard.json

  - name: istio-ztunnel-dashboard
    files:
      - istio-ztunnel-dashboard.json=https://raw.githubusercontent.com/istio/istio/1.29.0/manifests/addons/dashboards/ztunnel-dashboard.gen.json
