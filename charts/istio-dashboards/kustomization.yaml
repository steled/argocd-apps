apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
  labels:
    grafana_dashboard: "1"

configMapGenerator:

  - name: istio-extension-dashboard
    files:
      - dashboard.json=https://raw.githubusercontent.com/istio/istio/1.28.3/manifests/addons/dashboards/istio-extension-dashboard.json

  - name: istio-mesh-dashboard
    files:
      - dashboard.json=https://raw.githubusercontent.com/istio/istio/1.28.3/manifests/addons/dashboards/istio-mesh-dashboard.gen.json

  - name: istio-performance-dashboard
    files:
      - dashboard.json=https://raw.githubusercontent.com/istio/istio/1.28.3/manifests/addons/dashboards/istio-performance-dashboard.json

  - name: istio-service-dashboard
    files:
      - dashboard.json=https://raw.githubusercontent.com/istio/istio/1.28.3/manifests/addons/dashboards/istio-service-dashboard.json

  - name: istio-workload-dashboard
    files:
      - dashboard.json=https://raw.githubusercontent.com/istio/istio/1.28.3/manifests/addons/dashboards/istio-workload-dashboard.json
